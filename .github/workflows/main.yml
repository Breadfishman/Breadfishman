name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]   # daily at midnight UTC
  workflow_dispatch:                 # manual "Run workflow" button
  push: {branches: ["main"]}         # change to "master" if that's your default branch
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}   # classic token w/ repo + read:org
          user: breadfishman

          # --- Aggregate summary block ---
          base: header, activity, community, repositories, metadata

          # --- Pull in org-member repos (Numu) so it counts toward stats ---
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: Breadfishman   # add work commit email(s), comma-separated

          # --- Languages: default API algorithm (no cloning of private code) ---
          plugin_languages: yes
          plugin_languages_sections: most-used

          # --- Lines of code: aggregate total only ---
          plugin_lines: yes

          # --- Commit calendars ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_calendar: yes
          plugin_calendar_limit: 0          # 0 = full commit history (all years)

          # --- Coding habits: active hours/days, charts, facts ---
          plugin_habits: yes
          plugin_habits_from: 200           # commits to analyze
          plugin_habits_charts: yes
          plugin_habits_facts: yes

          # --- Achievements badges ---
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C  # C = show most; A = only rare

          # --- Issue/PR follow-up: aggregate counts ---
          plugin_followup: yes

          # ⚠️ INTENTIONALLY OFF — activity feed leaks repo names + PR/commit titles.
          # plugin_activity: yes
          # ⚠️ Also leave plugin_code OFF — it would render private code snippets.
