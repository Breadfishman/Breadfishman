name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]   # daily at midnight UTC
  workflow_dispatch:                 # manual "Run workflow" button
  push: {branches: ["main"]}         # change to "master" if that's your default branch
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20              # kills a hang instead of burning 6 hours
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}   # classic token w/ repo + read:org
          user: breadfishman

          # --- Aggregate summary block (commit/PR/issue counts, repo counts) ---
          base: header, activity, community, repositories, metadata

          # --- Pull in org-member repos so Numu counts toward the stats below ---
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: Breadfishman   # add your work commit email(s), comma-separated, so those commits attribute to you

          # --- Languages: aggregate percentages only, no code/filenames exposed ---
          plugin_languages: yes
          #plugin_languages_indepth: yes
          plugin_languages_sections: most-used

          # --- Lines of code: aggregate total ONLY (no per-repo breakdown = no repo names) ---
          plugin_lines: yes

          # --- Commit calendar: anonymous intensity squares ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Issue/PR follow-up: aggregate open/closed counts ---
          plugin_followup: yes

          # ⚠️ INTENTIONALLY OFF — the activity FEED leaks repo names + PR/commit titles.
          # Its visibility defaults to "all", so with the repo scope it would expose
          # private Numu activity on your PUBLIC profile. Do not enable:
          # plugin_activity: yes
