name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]   # runs daily at midnight UTC
  workflow_dispatch:                # lets you trigger it manually
  push: {branches: ["main"]}        # also runs on push to main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # optional config goes here, e.g.:
          # user: breadfishman
          # template: classic
          # base: header, activity, community, repositories, metadata
          # plugin_languages: yes
